<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planning Poker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <h1>Planning Poker</h1>
        <p>Session-only voting with Fibonacci cards. Create a room, share the invite link, and reveal together.</p>
      </section>

      <section id="status" class="status hidden" role="status" aria-live="polite"></section>

      <section id="entryPanel" class="panel">
        <h2 id="entryTitle">Create a Session</h2>
        <p id="entryHint">Sign in with Google to continue.</p>
        <div class="auth-buttons">
          <button id="googleSignInButton" type="button">Sign in with Google</button>
          <button id="googleSignOutButton" type="button" class="ghost hidden">Sign out</button>
        </div>
        <p id="signedInText" class="hint hidden"></p>
        <form id="entryForm" class="entry-form hidden">
          <button id="entryButton" type="submit">Create Session</button>
        </form>
      </section>

      <section id="roomPanel" class="panel hidden">
        <header class="room-header">
          <div>
            <p class="room-code-label">Session</p>
            <h2 id="roomCodeText">------</h2>
            <p id="roundText" class="round-text">Round 1</p>
          </div>
          <div class="header-actions">
            <button id="copyInviteButton" type="button" class="secondary">Copy Invite Link</button>
            <button id="leaveButton" type="button" class="ghost">Leave</button>
          </div>
        </header>

        <section class="controls">
          <div id="hostControls" class="host-controls hidden">
            <button id="revealButton" type="button">Reveal</button>
            <button id="nextRoundButton" type="button" class="secondary">New Round</button>
          </div>
          <div id="takeoverControls" class="host-controls hidden">
            <button id="claimHostButton" type="button" class="secondary">Claim Host</button>
          </div>
          <p id="controlHint" class="hint"></p>
        </section>

        <section class="cards-wrap" aria-label="Voting cards">
          <h3>Your vote</h3>
          <div id="cards" class="cards"></div>
        </section>

        <section class="participants-wrap">
          <div class="participants-head">
            <h3>Participants</h3>
            <span id="participantCount">0</span>
          </div>
          <ul id="participants" class="participants"></ul>
        </section>

        <section id="summary" class="summary hidden"></section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
